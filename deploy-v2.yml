name: Remote SSH Deploy

on:
  push:
    branches:
      - v2
      - main

jobs:
  deploy:
    runs-on: [ubuntu-latest, ubuntu-22.04]

    steps:
      - name: Install Deployment Tools
        run: |
          apt-get update
          apt-get install -y sshpass rsync git

      - name: Manual Checkout
        run: |
          echo "🚀 Refreshing workspace..."
          git init
          git remote add origin https://thesis.fbihm.online/bejasadhev/FBIHM.git
          BRANCH=$(echo ${GITHUB_REF} | sed 's|refs/heads/||')
          git -c http.sslVerify=false fetch origin $BRANCH
          git checkout -f $BRANCH
          git reset --hard FETCH_HEAD

      - name: Deploy to Remote Server via SSH
        env:
          SSH_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_USER="root"
          REMOTE_HOST="74.208.174.70"
          TARGET_DIR="/home/eujyrn/Desktop/flask_mongo_app"
          
          echo "🚀 Syncing to $REMOTE_HOST..."
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "rm -f $TARGET_DIR/app.py"
          
          sshpass -p "$SSH_PASS" rsync -avzc -e "ssh -o StrictHostKeyChecking=no" \
            --exclude 'venv/' --exclude 'data/' --exclude '.git/' \
            ./ $REMOTE_USER@$REMOTE_HOST:$TARGET_DIR/
          
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "
            cd /home/eujyrn/Desktop/flask_mongo_app
            echo '--- DEBUG: Current Directory ---'
            pwd
            
            if [ ! -d 'venv' ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
            
            echo '--- DEBUG: Checking MongoDB Connection ---'
            grep 'MONGO_URI' .env || grep 'MONGO_URI' app.py
            
            echo '🔄 Restarting Application...'
            fuser -k 5000/tcp || true
            pkill -f 'app.py' || true
            
            # Start and capture PID
            nohup venv/bin/python3 app.py > app.log 2>&1 < /dev/null &
            sleep 7
            
            if pgrep -f 'venv/bin/python3 app.py' > /dev/null; then
              echo '✅ SUCCESS: App is running on port 5000.'
              echo '--- Recent Logs ---'
              tail -n 10 app.log
            else
              echo '❌ ERROR: App failed to start. CRITICAL DEBUG LOGS BELOW:'
              cat app.log
              exit 1
            fi
          "
