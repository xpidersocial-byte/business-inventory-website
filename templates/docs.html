<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - FBIHM Documentation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030712;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
        }

        /* Sidebar Glassmorphism */
        .docs-sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 1000;
        }

        .docs-sidebar h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .nav-link {
            color: var(--text-secondary);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .nav-link.active {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Main Content */
        .docs-content {
            margin-left: 280px;
            flex: 1;
            padding: 4rem;
            max-width: 1000px;
        }

        .content-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Markdown Styling */
        .markdown-body {
            line-height: 1.7;
        }

        .markdown-body h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .markdown-body h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .markdown-body p {
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
            color: #d1d5db;
        }

        .markdown-body pre {
            background: #000 !important;
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 1.5rem;
            margin: 2rem 0;
            font-style: italic;
            color: var(--text-primary);
        }

        /* Mermaid Styling */
        .mermaid {
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 1rem;
            margin: 2rem 0;
            display: flex;
            justify-content: center;
        }

        .back-to-app {
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 1001;
        }

        @media (max-width: 992px) {
            .docs-sidebar {
                transform: translateX(-100%);
            }
            .docs-content {
                margin-left: 0;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="back-to-app">
        <a href="/" class="btn btn-outline-light btn-sm">
            <i class="fas fa-arrow-left me-2"></i> Back to Dashboard
        </a>
    </div>

    <aside class="docs-sidebar">
        <div class="mb-4">
            <h1 class="h4 fw-bold text-white">FBIHM Docs</h1>
            <p class="small text-secondary">System Intelligence Center</p>
        </div>

        <h2>Documentation</h2>
        <nav class="nav flex-column">
            <a class="nav-link {% if active_id == 'readme' %}active{% endif %}" href="/docs/readme">
                <i class="fas fa-book"></i> Welcome Guide
            </a>
            <a class="nav-link {% if active_id == 'thesis' %}active{% endif %}" href="/docs/thesis">
                <i class="fas fa-graduation-cap"></i> Thesis Roadmap
            </a>
            <a class="nav-link {% if active_id == 'design' %}active{% endif %}" href="/docs/design">
                <i class="fas fa-project-diagram"></i> System Architecture
            </a>
            <a class="nav-link {% if active_id == 'training' %}active{% endif %}" href="/docs/training">
                <i class="fas fa-brain"></i> Intelligence Data
            </a>
        </nav>
    </aside>

    <main class="docs-content">
        <div class="content-card">
            <div class="markdown-body">
                {{ content | safe }}
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            theme: 'dark',
            startOnLoad: true,
            securityLevel: 'loose',
            fontFamily: 'Inter',
        });
    </script>
</body>
</html>
