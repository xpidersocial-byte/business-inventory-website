<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ current_title }} | FBIHM Documentation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-bg: #080c14;
            --sidebar-bg: rgba(16, 22, 34, 0.8);
            --glass-card: rgba(255, 255, 255, 0.03);
            --accent-blue: #3b82f6;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }

        /* Sidebar Styling */
        .docs-sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 1000;
        }

        .docs-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2.5rem;
            color: white;
            text-decoration: none;
        }

        .docs-brand i {
            font-size: 1.5rem;
            color: var(--accent-blue);
        }

        .docs-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .nav-section-title {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 1rem;
            margin-top: 2rem;
        }

        .docs-nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.6rem 0.8rem;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .docs-nav-link:hover {
            background: var(--glass-card);
            color: white;
        }

        .docs-nav-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
            font-weight: 500;
        }

        /* Content Area Styling */
        .docs-main {
            margin-left: 280px;
            padding: 4rem 6rem;
            max-width: 1200px;
        }

        .docs-content {
            background: var(--glass-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3.5rem;
            line-height: 1.7;
        }

        /* Markdown Styles */
        .docs-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; color: #fff; }
        .docs-content h2 { font-size: 1.75rem; font-weight: 700; margin-top: 3rem; margin-bottom: 1.25rem; color: #fff; }
        .docs-content h3 { font-size: 1.25rem; font-weight: 600; margin-top: 2rem; color: var(--accent-blue); }
        .docs-content p { margin-bottom: 1.5rem; font-size: 1.05rem; }
        
        .docs-content code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #ec4899;
        }

        .docs-content pre {
            background: #0d1117;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin: 1.5rem 0;
            overflow-x: auto;
        }

        .docs-content pre code {
            background: transparent;
            color: #e6edf3;
            padding: 0;
        }

        .docs-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            overflow: hidden;
        }

        .docs-content th { background: rgba(59, 130, 246, 0.1); padding: 1rem; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border-color); }
        .docs-content td { padding: 1rem; border-bottom: 1px solid var(--border-color); }

        .docs-content blockquote {
            border-left: 4px solid var(--accent-blue);
            background: rgba(59, 130, 246, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 0 12px 12px 0;
            margin: 2rem 0;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 991px) {
            .docs-sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .docs-sidebar.active { transform: translateX(0); }
            .docs-main { margin-left: 0; padding: 2rem 1.5rem; }
            .docs-content { padding: 2rem 1.5rem; }
        }

        /* Back to App Button */
        .back-to-app {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent-blue);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 2000;
        }

        .back-to-app:hover {
            transform: translateY(-3px);
            color: white;
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <nav class="docs-sidebar">
        <a href="{{ url_for('dashboard.home') }}" class="docs-brand">
            <i class="bi bi-intersect"></i>
            <h1>FBIHM DOCS</h1>
        </a>

        <div class="nav-section-title">Knowledge Base</div>
        {% for link in nav_links %}
            <a href="{{ url_for('docs.view_doc', doc_id=link.id) }}" 
               class="docs-nav-link {% if active_doc == link.id %}active{% endif %}">
                <i class="bi bi-file-earmark-text"></i>
                {{ link.title }}
            </a>
        {% endfor %}
        
        <div class="mt-5 p-3 rounded" style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2);">
            <small class="text-dim d-block mb-1">Version</small>
            <div class="fw-bold text-white small">Stable v2.6.0</div>
            <div class="text-dim x-small mt-2" style="font-size: 0.7rem;">Automated MD Sync Engine Active</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="docs-main">
        <div class="docs-content">
            {{ content|safe }}
        </div>
        
        <footer class="mt-5 text-center text-dim pb-5">
            <small>&copy; 2026 FBIHM Inventory Engine | Documentation generated from master Markdown files.</small>
        </footer>
    </main>

    <!-- Floating Action Button -->
    <a href="{{ url_for('dashboard.home') }}" class="back-to-app">
        <i class="bi bi-arrow-left"></i>
        Return to App
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
