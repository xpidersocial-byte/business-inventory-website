<!DOCTYPE html>
<html lang="en" data-theme="facebook">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Recovery - {{ site_config.business_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/webp" href="{{ url_for('static', filename='images/login_hero.webp') }}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #1877f2 0%, #166fe5 100%);
            --card-bg: #ffffff;
            --sidebar-bg: #f0f2f5;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary-soft: #1877f2;
            --border-soft: #ced0d4;
        }

        body {
            background-color: var(--sidebar-bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(rgba(240, 242, 245, 0.8), rgba(240, 242, 245, 0.8)), url("{{ url_for('static', filename=site_config.login_background) }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container { width: 100%; max-width: 420px; }

        .card {
            background-color: var(--card-bg);
            border: none;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.1);
        }

        .card-body { padding: 2rem !important; }

        .recovery-icon {
            font-size: 3rem;
            color: var(--primary-soft);
            margin-bottom: 1rem;
        }

        .form-control {
            background-color: #ffffff;
            border: 1px solid var(--border-soft);
            color: #1c1e21 !important;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 16px;
        }

        .form-control:focus {
            border-color: var(--primary-soft);
            box-shadow: 0 0 0 2px rgba(24,119,242,0.2) !important;
        }

        .btn-primary {
            background-color: var(--primary-soft);
            border: none;
            padding: 12px;
            font-weight: 700;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #166fe5;
        }

        .btn-back {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--primary-soft);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .btn-back:hover { text-decoration: underline; color: #166fe5; }
    </style>
</head><body>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock text-primary mb-3" style="font-size: 3.5rem; color: var(--primary-soft) !important;"></i>
                <h2 class="fw-bold text-theme-main mb-1">Account Recovery</h2>
                <p class="text-theme-muted">{{ site_config.business_name }}</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <!-- Step 1: Request Code -->
                    <div id="step-1">
                        <p class="mb-4 text-center text-theme-muted">Enter your registered email address to receive a 6-digit password reset code.</p>
                        
                        <form id="requestForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-theme-muted">EMAIL ADDRESS</label>
                                <input type="email" id="emailInput" class="form-control" placeholder="name@company.com" required>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary" id="requestBtn">Send Reset Code</button>
                            </div>
                        </form>
                        <a href="{{ url_for('auth.login_page') }}" class="btn-back"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
                    </div>

                    <!-- Step 2: Verify & Reset -->
                    <div id="step-2" class="d-none">
                        <p class="mb-3 text-center text-success fw-bold"><i class="bi bi-check-circle-fill me-2"></i>Code sent to your email!</p>
                        <p class="mb-4 text-center small text-theme-muted">Enter the 6-digit code and your new password below.</p>
                        
                        <form id="resetForm">
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-theme-muted">6-DIGIT CODE</label>
                                <input type="text" id="codeInput" class="form-control text-center fw-bold" placeholder="------" maxlength="6" required style="letter-spacing: 0.5rem; font-size: 1.2rem;">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-theme-muted">NEW PASSWORD</label>
                                <input type="password" id="passwordInput" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary" id="resetBtn">Change Password</button>
                            </div>
                        </form>
                        <a href="#" class="btn-back" onclick="location.reload()"><i class="bi bi-arrow-counterclockwise me-1"></i>Start Over</a>
                    </div>
                </div>
            </div>


        </div>
    </div>

    <script>
        let storedEmail = "";

        // Request Code
        document.getElementById("requestForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("requestBtn");
            const email = document.getElementById("emailInput").value.trim();
            if(!email) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Sending...`;

            try {
                const formData = new FormData();
                formData.append('email', email);
                
                const response = await fetch('/forgot-password/request', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    storedEmail = email;
                    document.getElementById("step-1").classList.add("d-none");
                    document.getElementById("step-2").classList.remove("d-none");
                } else {
                    Swal.fire('Error', data.message || 'Error sending request.', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Send Reset Code`;
            }
        });

        // Verify and Reset
        document.getElementById("resetForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("resetBtn");
            const code = document.getElementById("codeInput").value.trim();
            const password = document.getElementById("passwordInput").value.trim();
            if(!code || !password) return;

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Resetting...`;

            try {
                const formData = new FormData();
                formData.append('email', storedEmail);
                formData.append('code', code);
                formData.append('password', password);
                
                const response = await fetch('/forgot-password/reset', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.success) {
                    await Swal.fire('Success!', data.message, 'success');
                    window.location.href = "{{ url_for('auth.index') }}";
                } else {
                    Swal.fire('Error', data.message || 'Invalid code.', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `Change Password`;
            }
        });
    </script>
</body>
</html>
