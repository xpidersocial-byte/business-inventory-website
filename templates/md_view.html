{% extends "base.html" %}

{% block title %}{{ filename }} - Documentation{% endblock %}

{% block extra_css %}
<style>
    .markdown-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        color: #24292e;
        line-height: 1.6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    
    .markdown-container h1, .markdown-container h2, .markdown-container h3 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
        border-bottom: 1px solid #eaecef;
        padding-bottom: .3em;
        color: #1a1e23;
    }

    .markdown-container p { margin-bottom: 16px; }
    
    .markdown-container a { color: #0366d6; text-decoration: none; }
    .markdown-container a:hover { text-decoration: underline; }

    .markdown-container code {
        padding: .2em .4em;
        margin: 0;
        font-size: 85%;
        background-color: rgba(27,31,35,.05);
        border-radius: 3px;
        font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
    }

    .markdown-container pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 6px;
        margin-bottom: 16px;
    }

    .markdown-container pre code {
        background-color: transparent;
        padding: 0;
        border: 0;
    }

    .markdown-container table {
        border-spacing: 0;
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
    }

    .markdown-container table th, .markdown-container table td {
        padding: 6px 13px;
        border: 1px solid #dfe2e5;
    }

    .markdown-container table tr:nth-child(2n) { background-color: #f6f8fa; }

    .markdown-container blockquote {
        padding: 0 1em;
        color: #6a737d;
        border-left: .25em solid #dfe2e5;
        margin-bottom: 16px;
    }

    .doc-meta {
        font-size: 0.85rem;
        color: #6a737d;
        margin-bottom: 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="doc-meta">
        <div>
            <a href="{{ url_for('auth.profile', tab='documentation') }}" class="btn btn-sm btn-outline-secondary me-2">
                <i class="bi bi-arrow-left me-1"></i>Back to Index
            </a>
            <span class="fw-bold text-dark">{{ filename }}</span>
        </div>
        <div class="text-muted small">
            <i class="bi bi-robot me-1"></i>AI-Public Access Enabled
        </div>
    </div>

    <div class="markdown-container">
        {{ content|safe }}
    </div>
</div>
{% endblock %}
