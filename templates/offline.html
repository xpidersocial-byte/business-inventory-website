<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | FBIHM</title>
    <!-- Zero External Dependencies - Inlined CSS for Offline Performance -->
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .offline-container {
            max-width: 480px;
            width: 90%;
            padding: 2.5rem;
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--accent);
            font-size: 2.5rem;
        }
        h1 { margin: 0 0 0.75rem; font-size: 1.75rem; font-weight: 800; }
        p { color: var(--text-muted); line-height: 1.5; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: var(--bg);
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .offline-badge {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon-box">⚡</div>
        <h1>System Offline</h1>
        <p>It looks like your internet connection is unavailable or the local server is unreachable. You can still access some features in read-only mode.</p>
        
        <div class="d-grid gap-3">
            <button onclick="window.location.reload()" class="btn">Check Connection</button>
            <br><br>
            <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: 600;">↩ Back to Login</a>
        </div>

        <div class="offline-badge">
            <span class="dot"></span>
            NETWORK DISCONNECTED
        </div>
    </div>

    <!-- PWA Helper to detect recovery -->
    <script>
        window.addEventListener('online', () => {
            console.log('[PWA] Network restored. Returning to app...');
            window.location.href = '/';
        });

        // Periodic Health Check
        setInterval(async () => {
            if (navigator.onLine) {
                try {
                    const res = await fetch('/health', { cache: 'no-store' });
                    if (res.ok) window.location.href = '/';
                } catch (e) {}
            }
        }, 10000);
    </script>
</body>
</html>
