<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode - {{ config.business_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #1e222d;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .maintenance-card {
            background: rgba(37, 42, 55, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .icon-box {
            font-size: 4rem;
            color: #ffc107;
            margin-bottom: 1.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <div class="icon-box">
            <i class="bi bi-tools"></i>
        </div>
        <h2 class="fw-bold mb-3">System Under Maintenance</h2>
        <p class="text-theme-muted mb-4">
            We are currently performing scheduled system upgrades to <strong>{{ config.business_name }}</strong>. 
            We'll be back online shortly. Thank you for your patience!
        </p>
        <div class="pt-3 border-top border-secondary border-opacity-25">
            <small class="text-theme-muted">Contact Support: {{ config.contact_email }}</small>
        </div>
    </div>
<script>if ("serviceWorker" in navigator) { window.addEventListener("load", () => { navigator.serviceWorker.register("/sw.js"); }); }</script></body>
</html>
