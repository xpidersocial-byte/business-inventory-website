name: Deploy to Local Server (Self-Hosted Runner)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Local Directory
        run: |
          # Use $HOME to identify the correct home directory
          TARGET_DIR="$HOME/Desktop/flask_mongo_app"
          
          echo "Deploying to: $TARGET_DIR"
          echo "Current user: $(whoami)"
          echo "Home directory: $HOME"
          
          # Create target directory if it doesn't exist
          mkdir -p "$TARGET_DIR"
          
          # Sync the checked-out code to the app directory
          rsync -av --delete --exclude 'venv/' --exclude '*.log' --exclude 'data/' ./ "$TARGET_DIR/"
          
          cd "$TARGET_DIR"
          
          # Ensure venv exists
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          
          source venv/bin/activate
          pip install -r requirements.txt
          
          # Ensure MongoDB is running (adjust command if you use a different service name)
          echo "Checking MongoDB status..."
          sudo systemctl start mongod || echo "MongoDB already running or manual start required"
          
          echo "Restarting application..."
          # Kill existing process if running
          pkill -f "venv/bin/python3 app.py" || echo "App was not running"
          
          # Start the app in the background on 0.0.0.0:5000
          # The app.py is already configured for HOST='0.0.0.0' and PORT=5000
          nohup venv/bin/python3 app.py > app.log 2>&1 &
          
          # Ensure Tailscale is serving port 5000 (TCP)
          echo "Exposing port 5000 via Tailscale Serve..."
          sudo tailscale serve --bg --tcp 5000 localhost:5000 || echo "Tailscale Serve failed or already active"
          
          echo "Deployment successful! App is running on 0.0.0.0:5000 and exposed via Tailscale."
