name: Deploy to VPS (via Tailscale)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Secret Availability (Debug)
        run: |
          if [ -z "${{ secrets.TS_OAUTH_CLIENT_ID }}" ]; then echo "❌ TS_OAUTH_CLIENT_ID is MISSING"; else echo "✅ TS_OAUTH_CLIENT_ID is found"; fi
          if [ -z "${{ secrets.TS_OAUTH_SECRET }}" ]; then echo "❌ TS_OAUTH_SECRET is MISSING"; else echo "✅ TS_OAUTH_SECRET is found"; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "❌ SSH_PRIVATE_KEY is MISSING"; else echo "✅ SSH_PRIVATE_KEY is found"; fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:server

      - name: SSH and Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.83.98.81
          username: xpider
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/eujyrn/Desktop/flask_mongo_app
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            echo "Restarting application..."
            pkill -f "venv/bin/python3 app.py" || echo "App was not running"
            echo "Deployment successful!"
