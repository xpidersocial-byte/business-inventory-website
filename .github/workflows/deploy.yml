name: Deploy to Local Server (Self-Hosted Runner)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Local Directory
        run: |
          # Sync the checked-out code to the app directory
          # We use rsync to update only changed files, excluding venv and logs
          rsync -av --delete --exclude 'venv/' --exclude '*.log' --exclude 'data/' ./ /home/eujyrn/Desktop/flask_mongo_app/
          
          cd /home/eujyrn/Desktop/flask_mongo_app
          
          # Ensure venv exists
          if [ ! -d "venv" ]; then
            python3 -m venv venv
          fi
          
          source venv/bin/activate
          pip install -r requirements.txt
          
          echo "Restarting application..."
          # Kill existing process if running
          pkill -f "venv/bin/python3 app.py" || echo "App was not running"
          
          # Start the app in the background (using nohup or similar)
          nohup venv/bin/python3 app.py > app.log 2>&1 &
          
          echo "Deployment successful!"
