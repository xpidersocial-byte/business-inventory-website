name: Remote SSH Deploy

on:
  push:
    branches:
      - v2

jobs:
  deploy:
    runs-on: [ubuntu-latest, ubuntu-22.04]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Deployment Tools
        run: |
          apt-get update
          apt-get install -y sshpass rsync

      - name: Deploy to Remote Server via SSH
        env:
          SSH_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          # Define remote details
          REMOTE_USER="root"
          REMOTE_HOST="74.208.174.70"
          TARGET_DIR="/home/eujyrn/Desktop/flask_mongo_app"
          
          echo "🚀 Syncing files to $REMOTE_HOST..."
          
          # 1. Ensure target directory exists on remote
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "mkdir -p $TARGET_DIR"
          
          # 2. Sync files using rsync over SSH
          sshpass -p "$SSH_PASS" rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
            --exclude 'venv/' --exclude 'data/' --exclude '.git/' --exclude 'temp_update/' \
            ./ $REMOTE_USER@$REMOTE_HOST:$TARGET_DIR/
          
          # 3. Remote execution: Setup and Restart
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST << 'EOF'
            cd /home/eujyrn/Desktop/flask_mongo_app
            
            # Setup VENV if missing
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Install requirements
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            echo "🔄 Restarting Flask Application..."
            # Kill existing process
            fuser -k 5000/tcp || true
            
            # Start the app
            nohup venv/bin/python3 app.py > app.log 2>&1 &
            
            sleep 5
            if pgrep -f "venv/bin/python3 app.py" > /dev/null; then
              echo "✅ App is running on remote server."
            else
              echo "❌ App failed to start. Last logs:"
              tail -n 20 app.log
              exit 1
            fi
          EOF
