name: Docker Stack Auto Deploy

on:
  push:
    branches:
      - v2

jobs:
  deploy:
    runs-on: [ubuntu-latest, ubuntu-22.04]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Docker CLI
        run: |
          # If docker is missing, install the CLI
          if ! command -v docker &> /dev/null; then
            apt-get update && apt-get install -y docker.io
          fi

      - name: Build Local Docker Image
        run: |
          # We use sudo here in case the runner user isn't in the docker group
          # If your runner supports passwordless sudo
          docker build -t fbihm-local:latest .

      - name: Initialize Swarm (If not already)
        run: |
          docker swarm init || true

      - name: Deploy to Swarm Stack
        run: |
          docker stack deploy -c stack.yml fbihm_stack

      - name: Cleanup Old Images
        run: |
          docker system prune -f
