name: Remote SSH Deploy

on:
  push:
    branches:
      - v2
      - main

jobs:
  deploy:
    runs-on: [ubuntu-latest, ubuntu-22.04]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Deployment Tools
        run: |
          apt-get update
          apt-get install -y sshpass rsync

      - name: Deploy to Remote Server via SSH
        env:
          SSH_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_USER="root"
          REMOTE_HOST="74.208.174.70"
          TARGET_DIR="/home/eujyrn/Desktop/flask_mongo_app"
          
          echo "🚀 Syncing files to $REMOTE_HOST..."
          
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "mkdir -p $TARGET_DIR"
          
          sshpass -p "$SSH_PASS" rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
            --exclude 'venv/' --exclude 'data/' --exclude '.git/' --exclude 'temp_update/' \
            ./ $REMOTE_USER@$REMOTE_HOST:$TARGET_DIR/
          
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST << 'REMOTECMD'
            cd /home/eujyrn/Desktop/flask_mongo_app
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
            echo "🔄 Restarting Flask Application..."
            fuser -k 5000/tcp || true
            nohup venv/bin/python3 app.py > app.log 2>&1 < /dev/null &
            sleep 5
            pgrep -f "venv/bin/python3 app.py" && echo "✅ App is running." || (echo "❌ Failed" && exit 1)
REMOTECMD
