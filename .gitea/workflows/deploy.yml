name: Remote SSH Deploy

on:
  push:
    branches:
      - v2
      - main

jobs:
  deploy:
    runs-on: [ubuntu-latest, ubuntu-22.04]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Deployment Tools
        run: |
          apt-get update
          apt-get install -y sshpass rsync

      - name: Deploy to Remote Server via SSH
        env:
          SSH_PASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_USER="root"
          REMOTE_HOST="74.208.174.70"
          TARGET_DIR="/home/eujyrn/Desktop/flask_mongo_app"
          
          echo "🚀 Preparing server for fresh deployment..."
          # Wipe old code files (excluding venv and data) to ensure 100% update
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST \
            "find $TARGET_DIR -maxdepth 1 -type f -not -name 'app.log' -delete"
          
          echo "🚀 Syncing new files..."
          sshpass -p "$SSH_PASS" rsync -avzc -e "ssh -o StrictHostKeyChecking=no" \
            --exclude 'venv/' --exclude 'data/' --exclude '.git/' \
            ./ $REMOTE_USER@$REMOTE_HOST:$TARGET_DIR/
          
          sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST << 'REMOTECMD'
            cd /home/eujyrn/Desktop/flask_mongo_app
            
            echo "--- Verifying Config Lock (.env) ---"
            if [ -f ".env" ]; then echo "✅ .env file exists."; else echo "❌ .env MISSING"; fi
            grep "MONGO_URI" .env
            
            # Setup
            if [ ! -d "venv" ]; then python3 -m venv venv; fi
            source venv/bin/activate
            pip install -r requirements.txt
            
            echo "🔄 Starting Application..."
            fuser -k 5000/tcp || true
            pkill -f "app.py" || true
            
            nohup venv/bin/python3 app.py > app.log 2>&1 < /dev/null &
            
            sleep 5
            if pgrep -f "venv/bin/python3 app.py" > /dev/null; then
              echo "✅ App is successfully running with LOCKED config."
            else
              echo "❌ Failed. Showing app.log:"
              tail -n 20 app.log
              exit 1
            fi
REMOTECMD
