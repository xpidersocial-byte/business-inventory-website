name: Build and Deploy to Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: bejasadhev/fbihm-inventory:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted  # This runs directly on your server via the runner
    steps:
      - name: Pull and Restart Containers
        run: |
          cd /home/eujyrn/Desktop/flask_mongo_app
          docker-compose pull
          docker-compose up -d
          docker system prune -f # Clean up old images to save space
