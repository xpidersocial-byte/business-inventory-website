<!DOCTYPE html>
<html lang="en" data-theme="facebook">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FBIHM Inventory</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/webp" href="/static/images/login_hero.webp">
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-gradient: linear-gradient(135deg, #1877f2 0%, #166fe5 100%);
            --card-bg: #ffffff;
            --sidebar-bg: #f0f2f5;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --primary-soft: #1877f2;
            --border-soft: #ced0d4;
        }


        body { 
            background: linear-gradient(rgba(240, 242, 245, 0.8), rgba(240, 242, 245, 0.8)), url("/static/images/login_hero.webp");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            background-color: var(--sidebar-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
        }
        .login-container { width: 92%; max-width: 420px; padding: 10px; }
        .card { 
            background-color: var(--card-bg); 
            border: none;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1), 0 8px 16px rgba(0,0,0,0.1);
        }
        .card-body { padding: 2rem !important; }
        @media (max-width: 576px) {
            .card-body { padding: 1.5rem !important; }
            h2 { font-size: 1.5rem; }
        }
        .form-control {
            background-color: #ffffff;
            border: 1px solid var(--border-soft);
            color: #1c1e21 !important;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 16px;
        }
        .form-control:focus {
            background-color: #ffffff;
            border-color: var(--primary-soft);
            color: #1c1e21 !important;
            box-shadow: 0 0 0 2px rgba(24,119,242,0.2) !important;
        }
        .btn-primary {
            background-color: #1877f2;
            border: none;
            padding: 12px;
            font-weight: 700;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-size: 18px;
        }
        .btn-primary:hover {
            background-color: #166fe5;
            transform: none;
        }
        .text-theme-main { color: var(--text-main) !important; }
        .text-theme-muted { color: var(--text-muted) !important; }
        
        .forgot-link {
            color: #1877f2;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="card border-0">
            <div class="card-body">
                <div class="text-center mb-4">
                    <img src="/static/images/login_hero.webp" alt="Logo" class="mb-3" style="width: 80px; height: 80px; object-fit: cover; border-radius: 12px;">
                    <h2 class="fw-bold mb-1" style="color: #1c1e21; letter-spacing: -1px;">FBIHM Inventory</h2>
                    <p class="text-muted small">Sign in to your secure portal</p>
                </div>
                
                <div class="alert alert-info alert-dismissible fade show rounded-3 small py-2" role="alert">
                    Dashboard Debug Mode Active.
                </div>

                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label small fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" id="email" placeholder="name@company.com" required autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-bold">Password</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password" style="border-right: none;">
                            <button class="btn btn-outline-secondary border-soft" type="button" id="togglePassword" style="border-left: none; background: #fff; border-color: var(--border-soft);">
                                <i class="bi bi-eye-slash" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary shadow-sm" type="submit" id="loginBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="loginSpinner" role="status" aria-hidden="true"></span>
                            <span id="loginText">Login</span>
                        </button>
                    </div>
                    
                    <div class="text-center mt-3 pt-2">
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                </form>

                <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
                    <p class="small text-theme-muted text-center mb-3"><i class="bi bi-geo-alt-fill me-1"></i>Tuburan, Cebu, Philippines</p>
                    
                    <div class="d-flex justify-content-center gap-3 mb-3">
                        <a href="#" class="text-theme-muted small text-decoration-none" title="Call Us"><i class="bi bi-telephone-fill"></i></a>
                        <a href="#" class="text-theme-muted small text-decoration-none" title="Email Us"><i class="bi bi-envelope-fill"></i></a>
                    </div>

                    <div class="d-flex justify-content-center gap-4 social-links">
                        <a href="#" target="_blank" class="text-primary opacity-50"><i class="bi bi-facebook fs-5"></i></a>
                        <a href="#" target="_blank" class="text-info opacity-50"><i class="bi bi-twitter-x fs-5"></i></a>
                        <a href="#" target="_blank" class="text-danger opacity-50"><i class="bi bi-instagram fs-5"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            eyeIcon.classList.toggle('bi-eye');
            eyeIcon.classList.toggle('bi-eye-slash');
        });

        document.querySelector('form').onsubmit = async function(e) {
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const text = document.getElementById('loginText');
            
            btn.disabled = true;
            spinner.classList.remove('d-none');
            text.innerText = ' Authenticating...';
        };
    </script>
</body>
</html>
