version: '3.8'

services:
  web:
    # We use a local image name that the runner will build
    image: fbihm-local:latest
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://74.208.174.70:27017/inventory_db
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - SECRET_KEY=supersecretkey
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - fbihm_net

networks:
  fbihm_net:
    driver: overlay
    attachable: true
